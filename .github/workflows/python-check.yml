name: Verificar Python

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verificar sintaxis
        run: |
          find . -name "*.py" -not -path "./.venv/*" | while read file; do
            python -m py_compile "$file" && echo "OK: $file" || echo "ERROR: $file"
          done